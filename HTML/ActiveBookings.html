<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMS Logistics Core - Активные заказы</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body>
    <div class="tms-app-container" id="bookingsMainContainer">
        
        <div class="tms-tabs-header" style="margin-bottom: 10px;">
            <button class="tms-tab-btn active" data-transport="all">🌍 Все активные</button>
            <button class="tms-tab-btn" data-transport="air">✈️ Авиа</button>
            <button class="tms-tab-btn" data-transport="sea">⚓ Море</button>
            <button class="tms-tab-btn" data-transport="road">🚛 ЛКВ</button>
            <button class="tms-tab-btn" data-transport="delays" style="color: #ef4444;">⚠️ Задержки</button>
        </div>

        <div class="tms-tabs-header" id="subTabsContainer" style="display: none; border-bottom: none; margin-bottom: 15px; gap: 8px;">
            <button class="tms-sub-tab-btn active" data-direction="export">Экспорт</button>
            <button class="tms-sub-tab-btn" data-direction="import">Импорт</button>
            <button class="tms-sub-tab-btn" data-direction="domestic">Внутренний</button>
        </div>

        <div class="tms-table-wrapper" style="background: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px; overflow-x: auto;">
            <table class="tms-bookings-table">
                <thead>
                    <tr>
                        <th data-sort="id">ID / Транспорт ↕</th>
                        <th>Участники</th>
                        <th>Маршрут</th>
                        <th data-sort="eta">Сроки (ETA) ↕</th>
                        <th>Статус</th>
                        <th data-sort="margin">Здоровье ↕</th>
                        <th style="text-align: right;">Действия</th>
                    </tr>
                </thead>
                <tbody id="tmsBookingsTableBody">
                    <tr><td colspan="7" class="tms-cell-center tms-text-sub">Загрузка данных...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <script type="module" src="../frontend/js/pages/page-bookings.js"></script>
    </body>
</html>
